spring:
  application:
    name: agent

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5-coder:7b
          temperature: 0.2
          top-p: 0.3
          max-tokens: 4096
      embedding:
        options:
          model: nomic-embed-text:latest

server:
  port: 8099

